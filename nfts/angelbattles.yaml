analysis: |
  ## Our History

  Angel Battles was one of the first play to earn games on the Ethereum blockchain.  According to DappRadar, it was in the top 5 of all Ethereum games by daily active users. 
  The  game was more complex than most other games at the time. There were 3 types of cards - angels, pets, and accessories. Angels were purchased and had one of six aura colors. 
  Level 1 pets could be claimed for free, and other pets could either be bred or recruited by defeating them in the battle arenas. When battling, players would randomly
  face either a monster or a pet. There were 24 different angels, 19 different pets, and 18 different accessories.

  Accessories were optional, but could be used to enhance stats in battles. Angels had battle power (set on creation), and experience (earned from battles).
  Pets had speed (set on creation) and aura power (earned through aura training and breeding).
  Accessories could be used to enhance some stats - for instance the sapphire colllar increased a pet's blue aura power. 

  There was a linear, 20 space leaderboard. Anyone could trustlessly open up their own 'sponsored leaderboard' with Ether which would reward the top 4 players on that leaderboard
  once the time was up. 

  Like many games of the time, the popularity plummeted as gas fees skyrocketed in summer 2018. 

  In 2022, a new version was launched on Polygon. This version had leaderboards which were 2 dimensional called battle mountains. The mountains had certain areas
  which enhanced certain attributes. For instance, red aura power was enhanced in the lava field. There were other official mountains which were limited in certain ways, 
  for instance, only light angels allowed, only dark angels allowed, only free cards allowed, etc. Players were also able to create their own mountains and limit the players who could enter. 

  With the polygon version, 100% of the money from card sales went to the Gitcoin matching pool. The game also featured a ERRC20 token called Halo. Halo is a governance
  token which was airdropped in a stream to all holders of the original ERC721 cards. It is also available as rewards for winning in any of the mountains or battle arenas. 

  The game is fully decentralized - the Ethereum contracts from 2018 are owned by the 0x0 address and the Polygon contracts are all controlled by the DAO.    
